services:
  - type: web
    name: generic-webapi
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: generic-webapi-db
          property: connectionString

databases:
  - name: generic-webapi-db
    plan: basic-256mb
    databaseName: generic_webapi
    user: generic_webapi_user
